<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fond bleu marine arrondi -->
  <rect width="512" height="512" rx="96" fill="#0d1b3e"/>
  <!-- Dégradé subtil -->
  <defs>
    <radialGradient id="g" cx="30%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#1a3a6e"/>
